services:

  ffmt_backend:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_backend_dotnet
    image: ffmt_backend
    container_name: ffmt_backend
    restart: "always"
    depends_on:
      - ffmt_elastic
      - ffmt_redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Scylla__ContactPoints__0=ffmt_scylla_node
      - Elastic__Url=http://ffmt_elastic:9200
      - Redis__Host=ffmt_redis
      - Redis__Port=6379
      - FfmtLogging__LogDirectory=/app/logs
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - ffmt_network

  ffmt_frontend:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_frontend
      args:
        VITE_API_BASE_URL: /api/v1
    image: ffmt_frontend
    restart: unless-stopped
    networks:
      - ffmt_network

  ffmt_proxy:
    container_name: ffmt_proxy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ZERO_SSL_USER_EMAIL=${ZERO_SSL_USER_EMAIL}
      - ZERO_SSL_MAIN_DOMAIN=${ZERO_SSL_MAIN_DOMAIN}
      - ZERO_SSL_MONITORING_DOMAIN=${ZERO_SSL_MONITORING_DOMAIN}
    depends_on:
      - ffmt_frontend
      - ffmt_backend
    networks:
      - ffmt_network

  ffmt_redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    deploy:
      resources:
        limits:
          memory: 384m
    networks:
      - ffmt_network

  ffmt_scylla_node:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_scylla
    image: ffmt_scylla
    profiles: ["scylla"]
    restart: "unless-stopped"
    # Host port publications live in the per-VM override
    # (docker-compose.scylla-vm.yml) — keeping them here would (a) leak Scylla
    # to the public NIC and (b) collide with ffmt_node_exporter on :9100 and
    # the override's private-IP bindings (compose appends port lists).
    volumes:
      - ./docker/scylla/persistent/data:/var/lib/scylla
      - ./docker/scylla/persistent/commitlog:/var/lib/scylla/commitlog
      - ./docker/scylla/persistent/saved_caches:/var/lib/scylla/saved_caches
      - ./docker/scylla/persistent/log:/var/log/scylla
      - ./docker/scylla/etc/scylla/scylla.yaml:/etc/scylla/scylla.yaml
      - ./docker/scylla/usr/local/bin:/usr/local/bin
      - ./docker/scylla/startup_scripts:/startup_scripts
    deploy:
      resources:
        limits:
          memory: 8g
    networks:
      - ffmt_network

  ffmt_elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.0
    restart: "unless-stopped"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ffmt_network

  ffmt_ws_worker:
    build:
      context: .
      dockerfile: ./docker/ws_worker/Dockerfile
    image: ffmt_ws_worker
    restart: always
    depends_on:
      - ffmt_redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Scylla__ContactPoints__0=ffmt_scylla_node
      - Redis__Host=ffmt_redis
      - Redis__Port=6379
      - FfmtLogging__LogDirectory=/app/logs
    volumes:
      - ./logs/ws_worker:/app/logs
    networks:
      - ffmt_network

  ffmt_node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ffmt_node_exporter
    profiles: ["host_metrics"]
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--web.listen-address=${HOST_PRIVATE_IP:-127.0.0.1}:9100"
    volumes:
      - "/:/host:ro,rslave"

networks:
  ffmt_network:
    driver: bridge

volumes:
  # Persists Caddy's ACME state across recreates so certs aren't re-issued every build.
  caddy_data:
  caddy_config:
