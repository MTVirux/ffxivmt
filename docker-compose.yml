services:

  ffmt_backend:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_backend_dotnet
    image: ffmt_backend
    restart: "always"
    depends_on:
      - ffmt_scylla_node
      - ffmt_elastic
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Scylla__ContactPoints__0=ffmt_scylla_node
      - Elastic__Url=http://ffmt_elastic:9200
      - FfmtLogging__LogDirectory=/app/logs
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - ffmt_network

  ffmt_frontend:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_frontend
      args:
        VITE_API_BASE_URL: /api/v1
    image: ffmt_frontend
    restart: unless-stopped
    networks:
      - ffmt_network

  ffmt_proxy:
    container_name: ffmt_proxy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ZERO_SSL_MAIN_DOMAIN=${ZERO_SSL_MAIN_DOMAIN}
    depends_on:
      - ffmt_frontend
      - ffmt_backend
    networks:
      - ffmt_network

  ffmt_redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    deploy:
      resources:
        limits:
          memory: 384m
    networks:
      - ffmt_network

  ffmt_scylla_node:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_scylla
    image: ffmt_scylla
    restart: "unless-stopped"
    ports:
      - 9042:9042
      - 9142:9142
      - 7000:7000
      - 7001:7001
      - 7199:7199
      - 10000:10000
      - 10001:10001
      - 9180:9180
      - 9100:9100
      - 9160:9160
      - 19042:19042
      - 19142:19142
    volumes:
      - ./docker/scylla/persistent/data:/var/lib/scylla
      - ./docker/scylla/persistent/commitlog:/var/lib/scylla/commitlog
      - ./docker/scylla/persistent/saved_caches:/var/lib/scylla/saved_caches
      - ./docker/scylla/persistent/log:/var/log/scylla
      - ./docker/scylla/etc/scylla/scylla.yaml:/etc/scylla/scylla.yaml
      - ./docker/scylla/usr/local/bin:/usr/local/bin
      - ./docker/scylla/startup_scripts:/startup_scripts
    deploy:
      resources:
        limits:
          memory: 8g
    networks:
      - ffmt_network

  ffmt_elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.0
    restart: "unless-stopped"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ffmt_network

networks:
  ffmt_network:
    driver: bridge

volumes:
  # Persists Caddy's ACME state across recreates so certs aren't re-issued every build.
  caddy_data:
  caddy_config:
