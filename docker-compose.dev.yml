# Dev overrides — file edits on the host are reflected in containers without a manual rebuild.
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# What each override does:
#   ffmt_backend         — disables OPcache so PHP edits land on the next request.
#   ffmt_backend_dotnet  — swaps to the SDK image and runs `dotnet watch` with polling;
#                          re-exposes :8080 directly for curl/Postman without going via Caddy.
#   ffmt_ws_worker       — sets WS_WORKER_DEV_WATCH=true, which routes startup through
#                          run_server_watch.sh (watchfiles-wrapped) for auto-restart on .py
#                          edits in /server, /sales_importer/python, and /ws_worker/common.
#   ffmt_frontend        — stops at the Node build stage and runs `pnpm dev` with HMR. Use
#                          this only if you specifically want a containerized SPA; for daily
#                          work prefer `pnpm dev` on the host (faster HMR on Windows).
#
# Note: ./backend_php_old, ./backend, and ./docker/ws_worker/{server,sales_importer,...} are
# already bind-mounted by the base docker-compose.yml — these overrides only flip dev
# behavior, they do not introduce new mounts beyond a single PHP ini drop-in.

services:
  ffmt_backend:
    volumes:
      # Compose merges this with the base file's ./backend_php_old:/var/www/html mount.
      - ./docker/backend/dev/zz-dev-opcache.ini:/usr/local/etc/php/conf.d/zz-dev-opcache.ini:ro

  ffmt_backend_dotnet:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_backend_dotnet_dev
    image: ffmt_backend_dotnet_dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    # Re-expose for direct probing — base compose hides this behind ffmt_proxy.
    ports:
      - "${BACKEND_DOTNET_HOST_PORT:-8080}:8080"
    volumes:
      - ./backend:/src/backend
      - ./logs/backend:/app/logs

  ffmt_ws_worker:
    environment:
      # Routes 999999- startup.sh to run_server_watch.sh. BACKEND_HOST/SCYLLADB_HOST are
      # already set in the base file and are merged in automatically.
      - WS_WORKER_DEV_WATCH=true

  ffmt_frontend:
    build:
      # Stop at the Node build stage; runtime stage has no pnpm.
      target: build
    command: pnpm dev --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Anonymous volume so a host node_modules can't shadow the container's install.
      - /app/node_modules
