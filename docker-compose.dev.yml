services:
  ffmt_backend:
    volumes:
      - ./docker/backend/dev/zz-dev-opcache.ini:/usr/local/etc/php/conf.d/zz-dev-opcache.ini:ro

  ffmt_backend_dotnet:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile_backend_dotnet_dev
    image: ffmt_backend_dotnet_dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "${BACKEND_DOTNET_HOST_PORT:-8080}:8080"
    volumes:
      - ./backend:/src/backend
      - ./logs/backend:/app/logs

  ffmt_frontend:
    build:
      # runtime stage has no pnpm
      target: build
    command: pnpm dev --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Anonymous volume so a host node_modules can't shadow the container's install.
      - /app/node_modules
