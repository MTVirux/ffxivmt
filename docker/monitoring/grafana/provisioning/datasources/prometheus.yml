apiVersion: 1

# Drop the previous auto-UID datasource so the pinned-UID one below is sole default.
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  # Lowercase name + pinned UID so both legacy templating (datasource: "prometheus"
  # string) and modern UID refs ({"type":"prometheus","uid":"prometheus"}) resolve.
  - name: prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://ffmt_prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
