# Caddy in front handles TLS and routes /api/* to the .NET backend; this server
# only ever sees frontend traffic on plain HTTP.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits hashed filenames into /assets/, so immutable is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Real 404 for these instead of falling through to the SPA shell.
    location = /favicon.svg { try_files $uri =404; }
    location = /robots.txt  { try_files $uri =404; }
}
